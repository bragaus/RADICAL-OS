<!DOCTYPE html>
<!-- @dsCard group="Components" name="Context menu" subtitle="Gradient title band + Send Signal submenu" viewport="700x230" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--base);font-family:var(--font-mono)}
  .wrap{padding:18px;display:flex;gap:14px;align-items:flex-start}
  .menu{width:210px;background:rgba(19,10,36,.95);border:1px solid var(--line-base);border-radius:3px;overflow:hidden}
  .band{height:26px;display:flex;align-items:center;padding:0 10px;font-size:11px;font-weight:800;
    letter-spacing:.6px;color:var(--v50);text-transform:uppercase;
    background:linear-gradient(90deg,var(--line-bright),var(--v950))}
  .item{display:flex;align-items:center;gap:9px;height:30px;padding:0 10px;font-size:11px;color:var(--text-primary)}
  .item img{width:15px;height:15px}
  .item.foc{background:var(--v700);color:var(--v50)}
  .item.foc img{filter:brightness(0) saturate(100%) invert(96%) sepia(8%) saturate(800%) hue-rotate(214deg) brightness(105%)}
  .item .arrow{margin-left:auto;color:var(--text-muted);font-size:11px}
  .item.foc .arrow{color:var(--v50)}
  /* signals submenu */
  .sig{width:150px}
  .sigrow{padding:3px 10px;font-size:10px;color:var(--text-primary);letter-spacing:.4px}
  .sigrow.danger{color:var(--crit)}
  .sigrow.danger.foc{background:var(--v700)}
</style>
</head>
<body>
  <div class="wrap">
    <div class="menu">
      <div class="band">CLIENT</div>
      <div class="item"><img src="../assets/icons/visible.svg" alt="">Visible</div>
      <div class="item"><img src="../assets/icons/sticky.svg" alt="">Sticky</div>
      <div class="item foc"><img src="../assets/icons/floating.svg" alt="">Floating</div>
      <div class="item"><img src="../assets/icons/fullscreen.svg" alt="">Fullscreen</div>
      <div class="item"><img src="../assets/icons/send_signal.svg" alt="">Send Signal<span class="arrow">▸</span></div>
      <div class="item"><img src="../assets/icons/close.svg" alt="">Close</div>
    </div>
    <div class="menu sig">
      <div class="band">SEND SIGNAL</div>
      <div class="sigrow">SIGHUP</div>
      <div class="sigrow">SIGINT</div>
      <div class="sigrow">SIGCONT</div>
      <div class="sigrow danger">SIGTERM</div>
      <div class="sigrow danger foc">SIGKILL</div>
      <div class="sigrow">SIGUSR1</div>
    </div>
  </div>
</body>
</html>
