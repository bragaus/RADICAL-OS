<!DOCTYPE html>
<!-- @dsCard group="Components" name="Buttons, chips & states" subtitle="Power chips, state pills, kill action" viewport="700x200" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--base);font-family:var(--font-mono)}
  .wrap{padding:18px;display:flex;flex-direction:column;gap:16px}
  .grp{display:flex;align-items:center;gap:10px}
  .glabel{width:88px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-faint)}
  /* power chips */
  .chip{display:flex;align-items:center;gap:6px;height:30px;padding:0 12px;border-radius:3px;
    background:var(--v700);color:var(--v50);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
  .chip img{width:15px;height:15px;filter:brightness(0) saturate(100%) invert(96%) sepia(8%) saturate(800%) hue-rotate(214deg) brightness(105%)}
  .chip.hover{background:var(--v600)}
  /* state pills */
  .pill{height:24px;padding:0 12px;display:flex;align-items:center;border-radius:3px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
  .normal{background:rgba(19,10,36,.9);border:1px solid var(--line-base);color:var(--text-primary)}
  .hover2{background:var(--raised);border:1px solid var(--line-bright);color:var(--text-bright)}
  .focus{background:var(--v700);border:1px solid var(--glow-core);color:var(--v50)}
  .press{background:var(--v600);border:1px solid var(--line-bright);color:var(--v50)}
  .urgent{background:rgba(192,38,211,.15);border:1px solid var(--glow-hot);color:var(--v50)}
  .disabled{background:rgba(19,10,36,.8);border:1px solid var(--line-faint);color:var(--text-disabled)}
  /* kill button */
  .killgrp{display:flex;align-items:center;gap:18px}
  .kill{display:flex;align-items:center;gap:6px;font-size:10px;font-weight:700;text-transform:uppercase}
  .kill img{width:16px;height:16px}
  .kill .lab{color:var(--text-muted)}
  .kill.hov .lab{color:var(--crit)}
  .kill.hov img{filter:brightness(0) saturate(100%) invert(56%) sepia(60%) saturate(2500%) hue-rotate(310deg) brightness(101%)}
</style>
</head>
<body>
  <div class="wrap">
    <div class="grp"><span class="glabel">Power chips</span>
      <span class="chip"><img src="../assets/icons/shutdown.svg" alt="">Shutdown</span>
      <span class="chip"><img src="../assets/icons/reboot.svg" alt="">Reboot</span>
      <span class="chip"><img src="../assets/icons/lock.svg" alt="">Lock</span>
      <span class="chip hover"><img src="../assets/icons/logout.svg" alt="">Logout</span>
    </div>
    <div class="grp"><span class="glabel">States</span>
      <span class="pill normal">Normal</span>
      <span class="pill hover2">Hover</span>
      <span class="pill focus">Focus</span>
      <span class="pill press">Press</span>
      <span class="pill urgent">Urgent</span>
      <span class="pill disabled">Disabled</span>
    </div>
    <div class="grp"><span class="glabel">Kill action</span>
      <div class="killgrp">
        <span class="kill"><img src="../assets/icons/kill.svg" alt=""><span class="lab">Kill · default</span></span>
        <span class="kill hov"><img src="../assets/icons/kill.svg" alt=""><span class="lab">Kill · hover</span></span>
      </div>
    </div>
  </div>
</body>
</html>
