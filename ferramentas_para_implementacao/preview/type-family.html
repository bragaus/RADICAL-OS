<!DOCTYPE html>
<!-- @dsCard group="Type" name="Type family — JetBrains Mono" subtitle="The single monospaced family + numerals" viewport="700x230" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--base);font-family:var(--font-mono);color:var(--text-primary)}
  .wrap{padding:18px}
  .fam{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--text-heading)}
  .sub{font-size:9.5px;color:var(--text-muted);margin-top:2px}
  .big{font-size:34px;font-weight:800;letter-spacing:1px;color:var(--text-bright);margin:12px 0 6px}
  .glyphs{font-size:14px;font-weight:500;color:var(--text-primary);line-height:1.5;letter-spacing:1px}
  .nums{font-size:14px;font-weight:800;color:var(--v400);letter-spacing:2px;margin-top:4px;font-variant-numeric:tabular-nums}
  .weights{display:flex;gap:18px;margin-top:12px}
  .weights span{font-size:15px}
</style>
</head>
<body>
  <div class="wrap">
    <div class="fam">JetBrains Mono</div>
    <div class="sub">Nerd Font in the WM · loaded as JetBrains Mono on web · the single family of the HUD</div>
    <div class="big">RADICAL HUD</div>
    <div class="glyphs">ABCDEFGHIJKLMNOPQRSTUVWXYZ abcdefghijklmnopqrstuvwxyz</div>
    <div class="nums">0123456789 ↑ ↓ % · &gt; ▸ : / — ▕█░</div>
    <div class="weights">
      <span style="font-weight:400">Regular 400</span>
      <span style="font-weight:500">Medium 500</span>
      <span style="font-weight:700">Bold 700</span>
      <span style="font-weight:800">ExtraBold 800</span>
    </div>
  </div>
</body>
</html>
