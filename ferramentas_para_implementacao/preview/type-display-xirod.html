<!DOCTYPE html>
<!-- @dsCard group="Type" name="Type display — Xirod" subtitle="Brand wordmark face (self-hosted)" viewport="700x200" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--base);font-family:var(--font-mono);color:var(--text-primary)}
  .wrap{padding:18px}
  .fam{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--text-heading)}
  .sub{font-size:9.5px;color:var(--text-muted);margin-top:2px}
  .word{font-family:var(--font-display);font-size:40px;letter-spacing:3px;color:var(--text-bright);
    text-transform:uppercase;margin:16px 0 8px;
    text-shadow:0 0 18px rgba(168,85,247,.45)}
  .alt{font-family:var(--font-display);font-size:18px;letter-spacing:2px;color:var(--v400);text-transform:uppercase}
  .note{font-size:9px;color:var(--text-faint);margin-top:14px;letter-spacing:.4px;text-transform:uppercase}
</style>
</head>
<body>
  <div class="wrap">
    <div class="fam">Xirod — brand display</div>
    <div class="sub">Wide, angular sci-fi face · wordmark &amp; hero logotype ONLY · never for data</div>
    <div class="word">RADICAL</div>
    <div class="alt">VIOLET HUD · LINUX RADICAL OS</div>
    <div class="note">Pair with JetBrains Mono for all UI data &amp; labels</div>
  </div>
</body>
</html>
