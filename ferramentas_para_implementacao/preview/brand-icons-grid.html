<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Icon set — 41 VIOLET HUD icons" subtitle="The full multi-tone SVG set, by category" viewport="700x540" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--base);font-family:var(--font-mono)}
  .wrap{padding:14px}
  .cat{font-size:8.5px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--text-heading);margin:10px 0 6px}
  .cat:first-child{margin-top:0}
  .grid{display:grid;grid-template-columns:repeat(11,1fr);gap:4px}
  .ic{background:rgba(19,10,36,.7);border:1px solid var(--line-faint);border-radius:3px;
    display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px}
  .ic img{width:22px;height:22px}
  .ic span{font-size:7px;color:var(--text-muted);text-align:center;letter-spacing:.2px}
</style>
</head>
<body>
  <div class="wrap" id="root"></div>
  <script>
    const cats = {
      'stats': ['cpu','cpu_temp','mem','gpu','gpu_temp','net','net_up','net_down','wifi','vol','battery'],
      'power': ['shutdown','reboot','logout','lock','suspend'],
      'proc': ['kill','kill_all'],
      'osd': ['notification','dnd','brightness','volume_mute'],
      'menu': ['visible','sticky','floating','fullscreen','send_signal','close'],
      'tagctl': ['add','remove','move_left','move_right'],
      'tags': ['term','internet','files','develop','edit','media','doc'],
      'time': ['clock','calendar']
    };
    document.getElementById('root').innerHTML = Object.entries(cats).map(([cat,names])=>`
      <div class="cat">${cat} · ${names.length}</div>
      <div class="grid">${names.map(n=>`
        <div class="ic"><img src="../assets/icons/${n}.svg" alt="${n}"><span>${n}</span></div>`).join('')}</div>
    `).join('');
  </script>
</body>
</html>
