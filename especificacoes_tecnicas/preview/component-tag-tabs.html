<!DOCTYPE html>
<!-- @dsCard group="Components" name="Tag tabs" subtitle="Sharp one-direction arrow tabs, all states" viewport="700x110" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--base);font-family:var(--font-mono)}
  .wrap{padding:18px}
  .bar{display:flex;gap:4px;align-items:center}
  .tab{display:flex;align-items:center;gap:6px;height:24px;padding:0 20px 0 10px;
    clip-path:polygon(0 0, calc(100% - 12px) 0, 100% 50%, calc(100% - 12px) 100%, 0 100%);
    font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
  .tab img{width:14px;height:14px}
  .idx{font-weight:800}
  .empty{background:var(--v975);color:var(--text-muted)}
  .occupied{background:var(--v975);color:var(--text-primary)}
  .selected{background:var(--v500);color:var(--v50)}
  .urgent{background:var(--glow-hot);color:var(--v50)}
  .row2{display:flex;gap:26px;margin-top:18px;font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}
  .row2 span b{color:var(--text-heading);font-weight:700}
  /* recolor svg strokes to match fg for selected/urgent */
  .selected img,.urgent img{filter:brightness(0) saturate(100%) invert(96%) sepia(8%) saturate(800%) hue-rotate(214deg) brightness(105%)}
</style>
</head>
<body>
  <div class="wrap">
    <div class="bar">
      <div class="tab selected"><span class="idx">1</span><img src="../assets/icons/internet.svg" alt="">PLANO-WEB3</div>
      <div class="tab occupied"><span class="idx">2</span><img src="../assets/icons/edit.svg" alt="">VIBE-STUDING</div>
      <div class="tab empty"><span class="idx">3</span><img src="../assets/icons/develop.svg" alt="">GHOST-SIGN</div>
      <div class="tab urgent"><span class="idx">4</span><img src="../assets/icons/media.svg" alt="">NEW-ICHIMOKU</div>
    </div>
    <div class="row2">
      <span><b>SELECTED</b> v500 / v50</span>
      <span><b>OCCUPIED</b> v975 / primary</span>
      <span><b>EMPTY</b> v975 / muted</span>
      <span><b>URGENT</b> glow_hot / v50</span>
    </div>
  </div>
</body>
</html>
