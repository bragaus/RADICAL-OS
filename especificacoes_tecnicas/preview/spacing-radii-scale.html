<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Radii & spacing scale" subtitle="Angular radii + dense spacing tokens" viewport="700x230" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--base);font-family:var(--font-mono)}
  .wrap{padding:16px;display:flex;gap:18px}
  .col{flex:1}
  .h{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--text-heading);margin-bottom:10px}
  .item{display:flex;align-items:center;gap:10px;margin-bottom:9px}
  .box{background:var(--v700);border:1px solid var(--line-bright);width:40px;height:30px;flex:none}
  .lbl{font-size:9.5px;color:var(--text-muted)}
  .lbl b{color:var(--text-primary);font-weight:700}
  .sp{background:var(--v500);height:14px;flex:none}
  .sp-lbl{font-size:9.5px;color:var(--text-muted)}
</style>
</head>
<body>
  <div class="wrap">
    <div class="col">
      <div class="h">Corner radii</div>
      <div class="item"><div class="box" style="border-radius:4px"></div><div class="lbl"><b>radius_panel</b> · 4px</div></div>
      <div class="item"><div class="box" style="border-radius:3px"></div><div class="lbl"><b>radius_chip</b> · 3px</div></div>
      <div class="item"><div class="box" style="border-radius:2px"></div><div class="lbl"><b>radius_bar</b> · 2px</div></div>
      <div class="item" style="margin-top:4px"><div class="lbl" style="color:var(--text-faint)">angular by design — never 10–15px</div></div>
    </div>
    <div class="col">
      <div class="h">Spacing scale</div>
      <div class="item"><div class="sp" style="width:3px"></div><div class="sp-lbl">pad_row_y · 3</div></div>
      <div class="item"><div class="sp" style="width:8px"></div><div class="sp-lbl">pad_panel · gap · 8</div></div>
      <div class="item"><div class="sp" style="width:10px"></div><div class="sp-lbl">corner_tick · 10</div></div>
      <div class="item"><div class="sp" style="width:20px"></div><div class="sp-lbl">header_h · lozenge_h · 20</div></div>
      <div class="item"><div class="sp" style="width:26px"></div><div class="sp-lbl">bar_h · 26</div></div>
    </div>
  </div>
</body>
</html>
