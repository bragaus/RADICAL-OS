<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Text colors" subtitle="bright → disabled, on panel" viewport="700x290" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--panel);font-family:var(--font-mono)}
  .wrap{padding:16px;display:flex;flex-direction:column;gap:6px}
  .row{display:flex;align-items:center;gap:12px;padding:5px 8px;border-bottom:1px solid var(--line-faint)}
  .specimen{flex:1;font-size:15px;font-weight:800}
  .name{width:120px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted)}
  .hex{width:70px;font-size:10px;color:var(--text-faint);text-align:right}
</style>
</head>
<body>
  <div class="wrap">
    <div class="row"><div class="name">text_bright</div><div class="specimen" style="color:var(--text-bright)">58% · 6.18.5 · ↑12</div><div class="hex">#e9dcff</div></div>
    <div class="row"><div class="name">text_primary</div><div class="specimen" style="color:var(--text-primary)">Default body text</div><div class="hex">#cbb6ff</div></div>
    <div class="row"><div class="name">text_heading</div><div class="specimen" style="color:var(--text-heading)">PANEL TITLE</div><div class="hex">#b794ff</div></div>
    <div class="row"><div class="name">text_body</div><div class="specimen" style="color:var(--text-body)">Secondary text</div><div class="hex">#9a82c4</div></div>
    <div class="row"><div class="name">text_muted</div><div class="specimen" style="color:var(--text-muted)">LABELS · UNITS</div><div class="hex">#6f5a96</div></div>
    <div class="row"><div class="name">text_faint</div><div class="specimen" style="color:var(--text-faint)">placeholder · 31</div><div class="hex">#463566</div></div>
    <div class="row" style="border-bottom:none"><div class="name">text_disabled</div><div class="specimen" style="color:var(--text-disabled)">disabled</div><div class="hex">#2f2348</div></div>
  </div>
</body>
</html>
