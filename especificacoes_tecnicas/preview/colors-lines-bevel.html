<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Lines & bevel" subtitle="border / divider / 2-tone bevel tokens" viewport="700x110" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--base);font-family:var(--font-mono)}
  .wrap{padding:16px}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px}
  .sw{border-radius:var(--radius-bar);overflow:hidden;border:1px solid rgba(91,33,182,.3)}
  .chip{height:40px}
  .meta{padding:5px 6px;background:rgba(7,3,16,.7)}
  .name{font-size:9px;font-weight:800;letter-spacing:.3px;color:var(--text-heading)}
  .hex{font-size:8px;color:var(--text-muted);margin-top:1px}
</style>
</head>
<body>
  <div class="wrap"><div class="grid">
    <div class="sw"><div class="chip" style="background:var(--line-faint)"></div><div class="meta"><div class="name">line_faint</div><div class="hex">#241640</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--line-dim)"></div><div class="meta"><div class="name">line_dim</div><div class="hex">#3a1f63</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--line-base)"></div><div class="meta"><div class="name">line_base</div><div class="hex">#5b21b6</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--line-bright)"></div><div class="meta"><div class="name">line_bright</div><div class="hex">#7c3aed</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--bevel-hi)"></div><div class="meta"><div class="name">bevel_hi</div><div class="hex">#9d6ff6</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--bevel-lo)"></div><div class="meta"><div class="name">bevel_lo</div><div class="hex">#160c28</div></div></div>
  </div></div>
</body>
</html>
