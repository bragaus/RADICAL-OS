<!DOCTYPE html>
<!-- @dsCard group="Components" name="Panel chrome — the central motif" subtitle="header + divider + body + border + bevel + ticks" viewport="700x180" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--base);font-family:var(--font-mono)}
  .wrap{padding:18px;display:flex;gap:22px;align-items:flex-start}
  /* the panel mold */
  .panel{position:relative;width:230px;background:rgba(19,10,36,.9);
    border:1px solid var(--line-base);border-radius:4px;
    box-shadow:inset 1px 1px 0 rgba(157,111,246,.7), inset -1px -1px 0 rgba(22,12,40,.9)}
  .hd{display:flex;align-items:center;justify-content:space-between;height:20px;padding:0 8px;
    background:var(--panel-hi);border-radius:4px 4px 0 0}
  .hd .t{font-size:11px;font-weight:800;letter-spacing:1px;color:var(--text-heading)}
  .hd img{width:13px;height:13px;opacity:.8}
  .dv{height:2px;background:linear-gradient(90deg,var(--v500),rgba(139,92,246,.22) 55%,transparent)}
  .bd{padding:7px 8px 8px}
  .kv{display:flex;justify-content:space-between;padding:2px 0;font-size:11px}
  .kv .k{color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;font-weight:700;font-size:10px}
  .kv .v{color:var(--text-bright);font-weight:800;font-variant-numeric:tabular-nums}
  .tick{position:absolute;width:10px;height:10px;border-color:rgba(139,92,246,.9);border-style:solid}
  .tl{top:-0;left:0;border-width:1.4px 0 0 1.4px}
  .tr{top:0;right:0;border-width:1.4px 1.4px 0 0}
  .bl{bottom:0;left:0;border-width:0 0 1.4px 1.4px}
  .br{bottom:0;right:0;border-width:0 1.4px 1.4px 0}
  .legend{font-size:10px;color:var(--text-body);line-height:1.9}
  .legend b{color:var(--text-heading);font-weight:700}
  .legend .sw{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:5px;vertical-align:-1px}
</style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <div class="tick tl"></div><div class="tick tr"></div><div class="tick bl"></div><div class="tick br"></div>
      <div class="hd"><span class="t">INFO</span><img src="../assets/icons/cpu.svg" alt=""></div>
      <div class="dv"></div>
      <div class="bd">
        <div class="kv"><span class="k">kernel</span><span class="v">6.18.5</span></div>
        <div class="kv"><span class="k">uptime</span><span class="v">04:21:55</span></div>
        <div class="kv"><span class="k">packages</span><span class="v">1487</span></div>
      </div>
    </div>
    <div class="legend">
      <div><b>The panel mold — used everywhere</b></div>
      <div><span class="sw" style="background:var(--panel-hi)"></span><b>header</b> · panel_hi · uppercase title</div>
      <div><span class="sw" style="background:linear-gradient(90deg,var(--v500),transparent)"></span><b>divider</b> · accent→transparent</div>
      <div><span class="sw" style="background:rgba(19,10,36,.9)"></span><b>body</b> · panel @ 0.9</div>
      <div><span class="sw" style="background:var(--line-base)"></span><b>border</b> · 1px line_base</div>
      <div><span class="sw" style="background:linear-gradient(135deg,var(--bevel-hi),var(--bevel-lo))"></span><b>bevel</b> · 2-tone inset</div>
      <div><span class="sw" style="background:var(--v500)"></span><b>corner ticks</b> · accent "L" ×4</div>
    </div>
  </div>
</body>
</html>
