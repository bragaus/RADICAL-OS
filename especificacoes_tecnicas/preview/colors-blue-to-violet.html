<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Blue → violet mapping" subtitle="How the reference blue rice translates" viewport="700x250" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--base);font-family:var(--font-mono)}
  .wrap{padding:14px}
  .row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
  .b{width:90px;height:26px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:8.5px;font-weight:700;color:#cde3ff}
  .arr{color:var(--text-muted);font-size:13px}
  .v{width:90px;height:26px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:8.5px;font-weight:700}
  .tok{font-size:9px;color:var(--text-muted);letter-spacing:.3px}
  .role{font-size:8.5px;color:var(--text-body);margin-left:6px;flex:1;text-transform:uppercase;letter-spacing:.3px}
</style>
</head>
<body>
  <div class="wrap" id="root"></div>
  <script>
    const map = [
      ['#5fd0ff','#d6c2ff','glow_ice','bright highlight (cyan)','#160c28'],
      ['#3aa0ff','#9d6ff6','v400','heading / text accent','#160c28'],
      ['#1e8aff','#8b5cf6','v500','primary (focus/select)','#fff'],
      ['#1f6fb2','#7c3aed','v600','bar / line fill','#fff'],
      ['#1a4a7a','#5b21b6','v800','panel border','#fff'],
      ['#0d3b66','#4c1d95','v900','deep fill / dark slice','#e9dcff'],
      ['#02060f','#130a24','panel','panel background','#cbb6ff'],
    ];
    document.getElementById('root').innerHTML = map.map(([b,v,tok,role,fg])=>`
      <div class="row">
        <div class="b" style="background:${b}">${b}</div>
        <span class="arr">→</span>
        <div class="v" style="background:${v};color:${fg}">${v}</div>
        <span class="tok">${tok}</span>
        <span class="role">${role}</span>
      </div>`).join('');
  </script>
</body>
</html>
