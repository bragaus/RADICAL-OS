<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Neon / glow accents" subtitle="glow_ice / soft / core / hot — highlights only" viewport="700x130" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--abyss);font-family:var(--font-mono)}
  .wrap{padding:16px;display:flex;gap:10px}
  .sw{flex:1;border:1px solid var(--line-base);border-radius:var(--radius-chip);overflow:hidden}
  .chip{height:60px;position:relative}
  .glow{position:absolute;inset:0;filter:blur(8px);opacity:.55}
  .meta{padding:6px 8px;background:rgba(7,3,16,.85)}
  .name{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--text-heading)}
  .hex{font-size:9.5px;color:var(--text-muted);margin-top:2px}
  .use{font-size:8.5px;color:var(--text-body);margin-top:3px;text-transform:uppercase;letter-spacing:.4px}
</style>
</head>
<body>
  <div class="wrap">
    <div class="sw"><div class="chip" style="background:var(--glow-ice)"><div class="glow" style="background:var(--glow-ice)"></div></div><div class="meta"><div class="name">glow_ice</div><div class="hex">#d6c2ff</div><div class="use">max highlight</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--glow-soft)"><div class="glow" style="background:var(--glow-soft)"></div></div><div class="meta"><div class="name">glow_soft</div><div class="hex">#b794ff</div><div class="use">header glow</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--glow-core)"><div class="glow" style="background:var(--glow-core)"></div></div><div class="meta"><div class="name">glow_core</div><div class="hex">#a855f7</div><div class="use">focus border</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--glow-hot)"><div class="glow" style="background:var(--glow-hot)"></div></div><div class="meta"><div class="name">glow_hot</div><div class="hex">#c026d3</div><div class="use">peak / alert</div></div></div>
  </div>
</body>
</html>
